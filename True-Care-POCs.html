<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>True Care — Portfólio de POCs</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<style>
:root{
  /* True Care — azul assistencial + azul-claro (arco da marca) */
  --navy-950:#0b2f57; --navy-900:#123f6e; --navy-800:#1a5290; --navy-700:#2266ad;
  --navy-600:#2f74c0; --blue-500:#4a9fdc; --blue-400:#66b2e6; --blue-300:#a9d5f2;
  --green:#2bb37e; --green-600:#1f9668; --green-200:#bfe9d6;
  --warn:#f5a524; --danger:#ef4d57; --ok:#1a9e6a;
  --bg:#eef4fb; --card:#ffffff; --ink:#0e2138; --muted:#5c6f86; --line:#e1e9f2;
  --ring:rgba(74,159,220,.42);
  --shadow:0 10px 30px -12px rgba(11,47,87,.30);
  --shadow-sm:0 4px 14px -8px rgba(11,47,87,.26);
  --grad:linear-gradient(120deg,#2266ad,#66b2e6);
}
*{box-sizing:border-box}
html,body{margin:0;padding:0}
body{
  font-family:'Inter',system-ui,-apple-system,Roboto,Arial,sans-serif;color:var(--ink);
  background:
    radial-gradient(900px 500px at 100% -5%,rgba(102,178,230,.14),transparent 60%),
    radial-gradient(800px 600px at -10% 110%,rgba(43,179,126,.12),transparent 55%),
    var(--bg);
  min-height:100vh;
}
a{color:inherit;text-decoration:none}
.app{display:flex;min-height:100vh}
h1,h2,h3,h4,.val,.brand b{font-family:'Manrope','Inter',sans-serif}

/* Sidebar */
.side{width:288px;flex-shrink:0;position:sticky;top:0;height:100vh;overflow-y:auto;
  background:linear-gradient(170deg,var(--navy-950),var(--navy-800) 60%,var(--navy-700));
  color:#cfe2f4;border-right:1px solid rgba(255,255,255,.06);}
.side::-webkit-scrollbar{width:7px}.side::-webkit-scrollbar-thumb{background:rgba(255,255,255,.14);border-radius:8px}
.brand{padding:24px 22px 12px}
.logo{display:block}
.logo svg{width:100%;max-width:200px;height:auto;display:block}
.brandsub{padding:8px 22px 14px;color:#8fb6dc;font-size:11px;line-height:1.4;border-bottom:1px solid rgba(255,255,255,.10)}
.navgroup{padding:8px 16px 2px}
.navgroup h4{margin:14px 0 8px;padding:0 10px;font-size:10.5px;letter-spacing:.16em;text-transform:uppercase;color:#7ba6d1;font-weight:700}
.nav a{display:flex;gap:11px;align-items:center;padding:10px 12px;border-radius:11px;font-size:13.5px;
  color:#b6d2ea;cursor:pointer;transition:.18s ease;position:relative;font-weight:500;}
.nav a .ico{width:22px;text-align:center;font-size:15px}
.nav a:hover{background:rgba(255,255,255,.07);color:#fff;transform:translateX(2px)}
.nav a.active{background:linear-gradient(90deg,rgba(102,178,230,.26),rgba(43,179,126,.10));
  color:#fff;font-weight:700;box-shadow:inset 0 0 0 1px rgba(102,178,230,.36);}
.nav a.active::before{content:"";position:absolute;left:-16px;top:8px;bottom:8px;width:4px;border-radius:0 4px 4px 0;background:var(--blue-400)}
.side .foot{padding:18px 22px 26px;color:#7ba6d1;font-size:11px;line-height:1.5}

/* Main */
.main{flex:1;min-width:0}
.topbar{backdrop-filter:saturate(160%) blur(10px);background:rgba(255,255,255,.8);border-bottom:1px solid var(--line);
  padding:15px 34px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:30;}
.topbar .crumb{font-size:11.5px;color:var(--muted);letter-spacing:.04em;text-transform:uppercase;font-weight:600}
.topbar h2{margin:3px 0 0;font-size:20px;letter-spacing:-.3px}
.pill{font-size:11px;padding:6px 13px;border-radius:999px;font-weight:700}
.tag-poc{background:linear-gradient(135deg,rgba(102,178,230,.20),rgba(34,102,173,.10));color:#1a5290;box-shadow:inset 0 0 0 1px rgba(102,178,230,.40)}
.content{padding:30px 34px 70px;max-width:1220px;animation:fade .4s ease}
@keyframes fade{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
.lead{color:var(--muted);font-size:14.5px;max-width:840px;line-height:1.6;margin:0 0 24px}
.lead b{color:var(--navy-700)}
.dashtag{display:inline-block;font-size:11px;font-weight:700;color:#1a5290;background:rgba(102,178,230,.18);padding:4px 11px;border-radius:999px;margin-bottom:10px;letter-spacing:.04em}

/* grid / cards */
.grid{display:grid;gap:18px}
.g2{grid-template-columns:repeat(2,1fr)}.g3{grid-template-columns:repeat(3,1fr)}.g4{grid-template-columns:repeat(4,1fr)}
@media(max-width:980px){.g2,.g3,.g4{grid-template-columns:1fr}}
.card{background:var(--card);border:1px solid var(--line);border-radius:18px;padding:20px;box-shadow:var(--shadow-sm);transition:transform .2s,box-shadow .2s;}
.card:hover{transform:translateY(-2px);box-shadow:var(--shadow)}
.card h3{margin:0 0 4px;font-size:14.5px;letter-spacing:-.2px}
.card .sub{color:var(--muted);font-size:12px;margin-bottom:14px}
.kpi{position:relative;overflow:hidden;background:var(--card);border:1px solid var(--line);border-radius:18px;padding:18px 20px;box-shadow:var(--shadow-sm);transition:.2s;}
.kpi:hover{transform:translateY(-2px);box-shadow:var(--shadow)}
.kpi .lab{font-size:12px;color:var(--muted);font-weight:500}
.kpi .val{font-size:28px;font-weight:800;letter-spacing:-1px;margin-top:4px;background:var(--grad);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent}
.kpi .delta{font-size:12px;font-weight:700;margin-top:5px}
.up{color:var(--ok)}.down{color:var(--danger)}.flat{color:var(--muted)}
.bar-top{height:4px;border-radius:6px;margin:-20px -20px 16px;background:var(--grad)}
canvas{max-width:100%}
.chartbox{height:262px;position:relative}.chartbox.sm{height:202px}.chartbox.lg{height:300px}

/* table */
table{width:100%;border-collapse:collapse;font-size:13px}
th,td{text-align:left;padding:10px;border-bottom:1px solid var(--line)}
th{font-size:10.5px;text-transform:uppercase;letter-spacing:.06em;color:var(--muted);font-weight:700}
tbody tr{transition:.15s}tbody tr:hover{background:#f2f8fd}
.badge{font-size:11px;font-weight:700;padding:4px 10px;border-radius:999px;display:inline-block}
.b-ok{background:#e4f6ec;color:#0f7a45}.b-warn{background:#fdf0db;color:#b9770a}.b-bad{background:#fdeaec;color:#cf2436}.b-info{background:#e5f0fb;color:#1a5290}

/* innovative components */
.gauge{position:relative;width:180px;height:180px;margin:0 auto}
.gauge .lbl{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center}
.gauge .lbl b{font-family:'Manrope';font-size:32px;line-height:1;background:var(--grad);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent}
.gauge .lbl span{font-size:11px;color:var(--muted);margin-top:4px}
.rings{display:grid;grid-template-columns:repeat(4,1fr);gap:16px}
@media(max-width:780px){.rings{grid-template-columns:repeat(2,1fr)}}
.ring{text-align:center}
.ring .circ{width:118px;height:118px;border-radius:50%;margin:0 auto;display:grid;place-items:center;position:relative}
.ring .circ::before{content:"";position:absolute;inset:11px;border-radius:50%;background:var(--card)}
.ring .circ b{position:relative;font-family:'Manrope';font-size:22px}
.ring .nm{font-size:12px;color:var(--muted);margin-top:10px;font-weight:600}
.ring .dl{font-size:11px;font-weight:700;margin-top:2px}
.minirings{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}
.heat{display:grid;gap:6px;font-size:12px}
.heat .hrow{display:grid;grid-template-columns:190px repeat(5,1fr);gap:6px;align-items:center}
.heat .hh{font-size:10px;color:var(--muted);font-weight:700;text-align:center;text-transform:uppercase;letter-spacing:.02em}
.heat .hl{font-size:12px;font-weight:600;color:var(--navy-700)}
.cell{height:42px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-weight:700;color:#fff;transition:transform .15s}
.cell:hover{transform:scale(1.08);box-shadow:var(--shadow)}
.c0{background:#e1e9f2;color:var(--muted)}
.c1{background:#1a9e6a}.c2{background:#66b2e6;color:#0b2f57}.c3{background:#f5a524}.c4{background:#ef4d57}
.heatleg{display:flex;gap:14px;margin-top:14px;font-size:11px;color:var(--muted);flex-wrap:wrap}
.sw{display:inline-block;width:12px;height:12px;border-radius:4px;margin-right:5px;vertical-align:middle}
.kanban{display:grid;grid-template-columns:repeat(5,1fr);gap:12px}
@media(max-width:980px){.kanban{grid-template-columns:1fr 1fr}}
.kcol{background:#f1f6fc;border:1px solid var(--line);border-radius:14px;padding:12px;min-height:240px}
.kcol .kh{display:flex;align-items:center;justify-content:space-between;font-size:11.5px;font-weight:700;margin-bottom:10px;color:var(--navy-700)}
.kcol .kh .cnt{background:#fff;border:1px solid var(--line);border-radius:999px;padding:1px 9px;font-size:11px}
.kdot{width:8px;height:8px;border-radius:50%;display:inline-block;margin-right:6px}
.kcard{background:#fff;border:1px solid var(--line);border-radius:11px;padding:11px;margin-bottom:9px;box-shadow:var(--shadow-sm);border-left:3px solid var(--blue-400)}
.kcard.cr{border-left-color:var(--danger)}.kcard.wn{border-left-color:var(--warn)}.kcard.ok{border-left-color:var(--ok)}
.kcard .kt{font-size:12px;font-weight:700}
.kcard .km{font-size:10.5px;color:var(--muted);margin-top:3px}
.kcard .kf{display:flex;align-items:center;justify-content:space-between;margin-top:8px;font-size:10px;color:var(--muted)}
.av{width:20px;height:20px;border-radius:50%;background:linear-gradient(135deg,var(--green),var(--navy-600));color:#fff;font-size:9px;display:flex;align-items:center;justify-content:center;font-weight:700}
.funnel{display:flex;flex-direction:column;align-items:center;gap:7px;padding:6px 0}
.fstage{color:#fff;border-radius:10px;padding:13px 16px;display:flex;align-items:center;justify-content:space-between;font-weight:700;box-shadow:var(--shadow-sm);transition:transform .15s}
.fstage:hover{transform:scale(1.02)}
.fstage small{font-weight:500;opacity:.9;font-size:11px}
.fstage b{font-family:'Manrope';font-size:16px}
.dealcard{display:flex;align-items:center;gap:11px;padding:10px 0;border-bottom:1px solid var(--line)}
.dealcard .di{width:34px;height:34px;border-radius:10px;background:linear-gradient(135deg,rgba(102,178,230,.16),rgba(34,102,173,.2));display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0}
.dealcard .dn{font-size:13px;font-weight:600}.dealcard .ds{font-size:11px;color:var(--muted)}
.dealcard .dv{margin-left:auto;font-family:'Manrope';font-weight:700;color:var(--navy-700);font-size:14px}
.twin{position:relative;background:linear-gradient(160deg,#0b2f57,#2266ad);border-radius:16px;height:330px;overflow:hidden}
.twin .grid-bg{position:absolute;inset:0;background-image:linear-gradient(rgba(255,255,255,.06) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.06) 1px,transparent 1px);background-size:28px 28px}
.hot{position:absolute;transform:translate(-50%,-50%);cursor:pointer}
.hot .pin{width:18px;height:18px;border-radius:50%;border:3px solid #fff;box-shadow:0 0 0 4px rgba(255,255,255,.12)}
.hot .pin.cr{background:var(--danger);animation:pulse 1.6s infinite}
.hot .pin.wn{background:var(--warn)}.hot .pin.ok{background:var(--ok)}.hot .pin.hq{background:var(--blue-400)}
@keyframes pulse{0%{box-shadow:0 0 0 0 rgba(239,77,87,.6)}70%{box-shadow:0 0 0 14px rgba(239,77,87,0)}100%{box-shadow:0 0 0 0 rgba(239,77,87,0)}}
.hot .tip{position:absolute;left:24px;top:-8px;background:rgba(255,255,255,.96);border-radius:8px;padding:5px 9px;font-size:10.5px;white-space:nowrap;color:var(--navy-800);font-weight:600;box-shadow:var(--shadow)}
.twin .lbl-eq{position:absolute;color:#bcd8f0;font-size:10px;font-weight:600}
.twinleg{display:flex;gap:16px;margin-top:12px;font-size:11px;color:var(--muted);flex-wrap:wrap}
.spark{display:flex;align-items:flex-end;gap:3px;height:36px}
.spark i{flex:1;background:linear-gradient(180deg,var(--blue-400),var(--blue-300));border-radius:3px 3px 0 0;min-height:3px}
.scoretab td{vertical-align:middle}
.trend-up{color:var(--ok);font-weight:700}.trend-dn{color:var(--danger);font-weight:700}

/* app showcases */
.applay{display:grid;grid-template-columns:300px 1fr;gap:24px;align-items:start}
@media(max-width:900px){.applay{grid-template-columns:1fr}}
.maplbl{font-size:10px;fill:#bcd8f0;font-weight:600}
.fmap{position:relative;height:330px;border-radius:14px;overflow:hidden;background:linear-gradient(160deg,#0b2f57,#2266ad)}
.syncrow{display:flex;gap:10px;flex-wrap:wrap}
.syncpill{display:flex;align-items:center;gap:8px;background:#fff;border:1px solid var(--line);border-radius:999px;padding:9px 14px;font-size:12px;font-weight:600;box-shadow:var(--shadow-sm)}
.syncpill .d{width:9px;height:9px;border-radius:50%}
.statrow{display:flex;align-items:center;justify-content:space-between;padding:9px 0;border-bottom:1px solid var(--line);font-size:13px}
.statrow b{font-family:'Manrope';font-size:18px}
.statrow .sd{width:9px;height:9px;border-radius:50%;display:inline-block;margin-right:8px}
.tline{position:relative;margin:30px 14px 10px;height:60px}
.tline .base{height:4px;background:var(--line);border-radius:4px;position:absolute;left:0;right:0;top:7px}
.tline .fillb{height:4px;border-radius:4px;position:absolute;left:0;top:7px;background:linear-gradient(90deg,var(--danger),var(--warn),var(--ok))}
.tnode{position:absolute;top:-1px;transform:translateX(-50%);text-align:center;width:88px}
.tnode .pin{width:18px;height:18px;border-radius:50%;border:3px solid #fff;margin:0 auto;box-shadow:var(--shadow-sm)}
.tnode .dd{font-size:11px;font-weight:700;margin-top:6px}
.tnode .cap{font-size:9.5px;color:var(--muted);margin-top:1px;font-weight:600;line-height:1.15}
.stepper{display:flex;align-items:flex-start;margin:10px 0 4px}
.snode{flex:1;text-align:center;position:relative}
.snode .cir{width:34px;height:34px;border-radius:50%;margin:0 auto;display:flex;align-items:center;justify-content:center;font-weight:700;color:#fff;font-size:13px;position:relative;z-index:2}
.snode .cir.done{background:var(--ok)}.snode .cir.act{background:var(--navy-600);box-shadow:0 0 0 5px rgba(47,116,192,.18)}.snode .cir.pend{background:#c1d3e6}
.snode .stx{font-size:10.5px;margin-top:8px;color:var(--navy-700);font-weight:700;line-height:1.2}
.snode .ssub{font-size:10px;color:var(--muted);margin-top:1px}
.snode::before{content:"";position:absolute;top:17px;left:-50%;width:100%;height:3px;background:var(--line);z-index:1}
.snode:first-child::before{display:none}
.snode.fdone::before{background:var(--ok)}
.xpwrap{display:flex;align-items:center;gap:12px}
.lvl{width:46px;height:46px;border-radius:13px;background:linear-gradient(135deg,var(--green),var(--navy-600));color:#fff;display:flex;flex-direction:column;align-items:center;justify-content:center;flex-shrink:0;box-shadow:var(--shadow-sm)}
.lvl b{font-family:'Manrope';font-size:17px;line-height:1}.lvl span{font-size:8px;letter-spacing:.08em}
.xpbar{height:12px;border-radius:999px;background:#e1e9f2;overflow:hidden;margin:7px 0 4px}
.xpbar i{display:block;height:100%;background:var(--grad)}
.streak{display:flex;gap:5px;flex-wrap:wrap;margin-top:8px}
.streak i{width:21px;height:21px;border-radius:5px;background:#e1e9f2}
.streak i.on{background:linear-gradient(135deg,var(--green),var(--green-600))}
.streak i.today{outline:2px solid var(--navy-600);outline-offset:1px}
.badgewall{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-top:4px}
.bdg{text-align:center;background:#f1f6fc;border:1px solid var(--line);border-radius:12px;padding:11px 6px}
.bdg .ic{font-size:22px}.bdg .bn{font-size:9.5px;color:var(--muted);margin-top:5px;font-weight:600;line-height:1.15}
.bdg.lock{opacity:.4;filter:grayscale(1)}
.leader .lr{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--line);font-size:12.5px}
.leader .rk{width:23px;height:23px;border-radius:50%;background:var(--navy-700);color:#fff;font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.leader .rk.g{background:linear-gradient(135deg,#f5a524,#e08600)}
.leader .lr.me{font-weight:700;color:var(--navy-700)}
.leader .lr .pts{margin-left:auto;font-weight:700;color:var(--muted)}
.detview{position:relative;border-radius:14px;overflow:hidden;background:linear-gradient(135deg,#0b2f57,#1a5290);height:300px}
.detview .gridb{position:absolute;inset:0;background-image:linear-gradient(rgba(255,255,255,.05) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.05) 1px,transparent 1px);background-size:30px 30px}
.bbox{position:absolute;border:2px solid;border-radius:6px}
.bbox .bl{position:absolute;top:-19px;left:-2px;font-size:10px;font-weight:700;padding:1px 6px;border-radius:5px;color:#0b2f57;white-space:nowrap}
.confrow{display:flex;align-items:center;gap:11px;margin-bottom:11px}
.confrow .cn{font-size:12px;width:170px;font-weight:600}
.confbar{flex:1;height:9px;border-radius:9px;background:#e1e9f2;overflow:hidden}
.confbar i{display:block;height:100%;border-radius:9px}
.confrow .cv{font-size:11px;font-weight:700;width:46px;text-align:right}
.pipe{display:flex;align-items:center;flex-wrap:wrap}
.pstep{flex:1;text-align:center;background:#f1f6fc;border:1px solid var(--line);border-radius:11px;padding:10px 6px;min-width:84px}
.pstep .pi{font-size:17px}.pstep .pn{font-size:10px;font-weight:700;margin-top:3px;color:var(--navy-700)}
.parr{color:var(--green-600);font-weight:800;padding:0 6px}

/* personalization extras */
.certrow{display:flex;gap:8px;flex-wrap:wrap;margin-top:16px}
.cert{display:inline-flex;align-items:center;gap:6px;font-size:11px;font-weight:700;color:#fff;background:rgba(102,178,230,.20);border:1px solid rgba(102,178,230,.42);padding:5px 12px;border-radius:999px}
.livechip{display:inline-flex;align-items:center;font-size:11px;color:var(--muted);font-weight:600}
.livedot{width:8px;height:8px;border-radius:50%;background:#1a9e6a;display:inline-block;margin-right:7px;box-shadow:0 0 0 0 rgba(26,158,106,.6);animation:lp 1.8s infinite}
@keyframes lp{0%{box-shadow:0 0 0 0 rgba(26,158,106,.5)}70%{box-shadow:0 0 0 8px rgba(26,158,106,0)}100%{box-shadow:0 0 0 0 rgba(26,158,106,0)}}
.clientwall{display:grid;grid-template-columns:repeat(5,1fr);gap:10px}
@media(max-width:780px){.clientwall{grid-template-columns:repeat(2,1fr)}}
.cwall{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:5px;background:#f1f6fc;border:1px solid var(--line);border-radius:12px;padding:14px 8px;font-family:'Manrope';font-weight:700;font-size:12px;color:var(--navy-700);text-align:center;transition:.2s}
.cwall .ce{font-size:20px}
.cwall:hover{transform:translateY(-2px);box-shadow:var(--shadow);color:var(--green-600)}
.donutwrap{position:relative}
.donutctr{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;pointer-events:none}
.donutctr b{font-family:'Manrope';font-size:23px;line-height:1}
.donutctr span{font-size:11px;color:var(--muted);margin-top:2px}

/* phone mockups */
.phones{display:flex;flex-wrap:wrap;gap:28px}
.phone{width:300px;flex-shrink:0;border-radius:40px;padding:11px;background:linear-gradient(160deg,#0b2f57,#1a5290);
  box-shadow:0 30px 60px -22px rgba(6,26,50,.6),inset 0 0 0 1px rgba(255,255,255,.06);position:relative;}
.phone::before{content:"";position:absolute;top:18px;left:50%;transform:translateX(-50%);width:96px;height:22px;background:#06213f;border-radius:0 0 14px 14px;z-index:5}
.phone .screen{background:#eef4fb;border-radius:30px;overflow:hidden;height:600px;display:flex;flex-direction:column}
.ph-status{height:30px;background:linear-gradient(135deg,var(--navy-800),var(--navy-600));color:#fff;font-size:10px;display:flex;align-items:center;justify-content:space-between;padding:0 18px}
.ph-head{background:linear-gradient(135deg,var(--navy-800),var(--navy-600));color:#fff;padding:8px 18px 16px;position:relative}

.ph-body{flex:1;overflow-y:auto;padding:14px 14px 18px;background:#eef4fb}

.ph-nav{height:58px;background:#fff;border-top:1px solid var(--line);display:flex;box-shadow:0 -4px 14px -8px rgba(11,47,87,.18)}

.mini{background:#fff;border:1px solid var(--line);border-radius:14px;padding:12px 13px;margin-bottom:11px;box-shadow:var(--shadow-sm)}
.mini .mt{font-size:13px;font-weight:600}

.row{display:flex;align-items:center;justify-content:space-between;gap:8px}
.chk{display:flex;align-items:center;gap:10px;padding:9px 0;border-bottom:1px solid var(--line);font-size:12.5px}
.box{width:19px;height:19px;border-radius:6px;border:2px solid var(--blue-300);flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:11px;color:#fff}
.box.c{background:var(--ok);border-color:var(--ok)}.box.x{background:var(--danger);border-color:var(--danger)}
.btn{display:inline-block;background:linear-gradient(135deg,var(--navy-700),var(--navy-600));color:#fff;border-radius:11px;padding:10px 15px;font-size:12.5px;font-weight:700;text-align:center;box-shadow:0 8px 18px -10px rgba(47,116,192,.7)}
.btn.full{display:block}
.btn.acc{background:var(--grad);color:#fff;box-shadow:0 8px 18px -10px rgba(102,178,230,.8)}
.progress{height:9px;border-radius:9px;background:#e1e9f2;overflow:hidden}
.progress i{display:block;height:100%;background:var(--grad);border-radius:9px}
.note{font-size:12.5px;color:var(--muted);line-height:1.55}
.callout{background:linear-gradient(135deg,rgba(102,178,230,.12),rgba(34,102,173,.08));border:1px solid var(--line);border-left:4px solid var(--blue-400);border-radius:12px;padding:12px 15px;font-size:13px;color:var(--navy-700);margin:6px 0 18px;line-height:1.5}
.feat{display:flex;gap:11px;align-items:flex-start;font-size:13px;margin-bottom:11px;line-height:1.5}
.feat .fi{width:30px;height:30px;border-radius:10px;background:linear-gradient(135deg,rgba(102,178,230,.18),rgba(34,102,173,.2));color:var(--navy-700);display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:14px}

/* power platform flow */
.flow{display:flex;align-items:stretch;gap:0;flex-wrap:wrap}
.step{background:linear-gradient(180deg,#fff,#f4f9fe);border:1px solid var(--line);border-radius:14px;padding:14px;min-width:148px;flex:1;text-align:center;box-shadow:var(--shadow-sm);transition:.2s}
.step:hover{transform:translateY(-3px);box-shadow:var(--shadow)}
.step .si{font-size:22px}.step .sn{font-weight:700;font-size:13px;margin-top:5px;font-family:'Manrope'}.step .sd{font-size:11px;color:var(--muted);margin-top:3px;line-height:1.35}
.arrow{display:flex;align-items:center;justify-content:center;color:var(--green-600);font-size:20px;padding:0 8px;font-weight:800}
@media(max-width:900px){.arrow{transform:rotate(90deg);padding:8px 0}}
.archlegend{display:flex;gap:16px;flex-wrap:wrap;font-size:12px;color:var(--muted);margin-top:16px}
.dot{display:inline-block;width:10px;height:10px;border-radius:3px;margin-right:5px;vertical-align:middle}
.disc{font-size:11px;color:var(--muted);font-style:italic;margin-top:18px}
.stack>*+*{margin-top:18px}
.hero{border-radius:20px;padding:26px 28px;margin-bottom:24px;color:#e7f0fa;position:relative;overflow:hidden;
  background:linear-gradient(135deg,var(--navy-900),var(--navy-700));box-shadow:var(--shadow);}
.hero::after{content:"";position:absolute;right:-60px;top:-60px;width:240px;height:240px;border-radius:50%;background:radial-gradient(circle,rgba(102,178,230,.42),transparent 65%)}

</style>

const VIEWS={app1,app2,app3,app4,app5,dash1,dash2,dash3,dash4,dash5,pp1,pp2,pp3,pp4,pp5};
function go(id){
  destroyCharts();
  const m=meta(id);
  document.getElementById('crumb').textContent=m?m.crumb:'Início';
  document.getElementById('title').textContent=m?(m.ico+' '+m.name):'Portfólio de POCs — True Care';
  document.getElementById('pocflag').textContent=m?'Prova de conceito':'15 provas de conceito';
  const v=document.getElementById('view');
  v.style.animation='none';void v.offsetWidth;v.style.animation='';
  v.innerHTML=(VIEWS[id]||home)();
  setActive(id);window.scrollTo(0,0);
}
buildNav();
